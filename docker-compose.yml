services:
  orchestrator:
    build: ./orchestrator
    container_name: spindeln-orchestrator
    ports:
      - "8083:8083"
    environment:
      - SPINDELN_HOST=0.0.0.0
      - SPINDELN_PORT=8083
      - HIVEMINDDB_URL=http://hiveminddb:8100
      - VLLM_URL=http://deepresearch-vllm:8000/v1
      - VLLM_MODEL=Qwen/Qwen3.5-0.8B
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - LOOM_DB_PATH=/data/loom/loom.db
      - TOR_PROXY=socks5://tor-proxy:9050
    volumes:
      - ./orchestrator/src:/app/src
      - ${LOOM_DATA_PATH:-./data/loom}:/data/loom:ro
      - orchestrator_data:/app/data
    depends_on:
      - hiveminddb
      - searxng
      - crawl4ai
    networks:
      - spindeln-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: spindeln-frontend
    ports:
      - "3001:3000"
    environment:
      - VITE_API_URL=http://localhost:8083
      - VITE_WS_URL=ws://localhost:8083/ws
    depends_on:
      - orchestrator
    networks:
      - spindeln-net
    restart: unless-stopped

  hiveminddb:
    image: deepresearch-hiveminddb:latest
    container_name: spindeln-hiveminddb
    ports:
      - "8101:8100"
    environment:
      - HIVEMIND_LISTEN_ADDR=0.0.0.0:8100
      - HIVEMIND_EMBEDDING_MODEL=local:all-MiniLM-L6-v2
    volumes:
      - hivemind_data:/app/data
    networks:
      - spindeln-net
    restart: unless-stopped

  vllm:
    image: deepresearch-vllm:latest
    container_name: spindeln-vllm
    ports:
      - "8001:8000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - FLASHINFER_DISABLE_VERSION_CHECK=1
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command: >
      --model Qwen/Qwen3.5-0.8B
      --quantization fp8
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --port 8000
      --reasoning-parser qwen3
    networks:
      - spindeln-net
    restart: unless-stopped
    profiles:
      - gpu

  searxng:
    image: searxng/searxng:latest
    container_name: spindeln-searxng
    ports:
      - "8889:8080"
    volumes:
      - searxng_data:/etc/searxng
    networks:
      - spindeln-net
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: spindeln-crawl4ai
    ports:
      - "11236:11235"
    environment:
      - CRAWL4AI_API_TOKEN=
    networks:
      - spindeln-net
    restart: unless-stopped

  tor-proxy:
    image: dperson/torproxy:latest
    container_name: spindeln-tor
    ports:
      - "9051:9050"
    networks:
      - spindeln-net
    restart: unless-stopped

networks:
  spindeln-net:
    driver: bridge

volumes:
  hivemind_data:
  searxng_data:
  orchestrator_data:
