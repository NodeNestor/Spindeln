services:
  orchestrator:
    build: ./orchestrator
    ports:
      - "8082:8082"
    environment:
      - SPINDELN_HOST=0.0.0.0
      - SPINDELN_PORT=8082
      - HIVEMINDDB_URL=http://hiveminddb:8100
      - VLLM_URL=http://vllm:8000/v1
      - VLLM_MODEL=Qwen/Qwen3-8B-AWQ
      - SEARXNG_URL=http://searxng:8080
      - CRAWL4AI_URL=http://crawl4ai:11235
      - LOOM_DB_PATH=/data/loom/loom.db
      - TOR_PROXY=socks5://tor-proxy:9050
    volumes:
      - ./orchestrator/src:/app/src
      - loom_data:/data/loom:ro
    depends_on:
      - hiveminddb
      - searxng
      - crawl4ai
    networks:
      - spindeln-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8082
      - VITE_WS_URL=ws://localhost:8082/ws
    depends_on:
      - orchestrator
    networks:
      - spindeln-net
    restart: unless-stopped

  hiveminddb:
    image: hiveminddb
    ports:
      - "8100:8100"
    environment:
      - HIVEMIND_LISTEN_ADDR=0.0.0.0:8100
      - HIVEMIND_EMBEDDING_MODEL=local:all-MiniLM-L6-v2
    volumes:
      - hivemind_data:/data
    networks:
      - spindeln-net
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    environment:
      - VLLM_MODEL=Qwen/Qwen3-8B-AWQ
    command: >
      --model Qwen/Qwen3-8B-AWQ
      --quantization awq
      --max-model-len 32768
      --gpu-memory-utilization 0.90
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - spindeln-net
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    networks:
      - spindeln-net
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    ports:
      - "11235:11235"
    environment:
      - CRAWL4AI_API_TOKEN=
    networks:
      - spindeln-net
    restart: unless-stopped

  tor-proxy:
    image: dperson/torproxy:latest
    ports:
      - "9050:9050"
    networks:
      - spindeln-net
    restart: unless-stopped

networks:
  spindeln-net:
    driver: bridge

volumes:
  hivemind_data:
  searxng_data:
  loom_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:/Loom/data
